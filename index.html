<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Contact Management System</h1>
    
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="formTitle">Add Contact</h2>
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter full name" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email address" required />
          </div>
          <div class="btn-row">
            <button type="submit" class="btn-primary" id="saveBtn">Add Contact</button>
            <button type="button" class="btn-secondary" id="clearBtn">Clear</button>
          </div>
        </form>
        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <h2>Contacts</h2>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search contact by name, phone, or email..." />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contactList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js">
   
  </script>
</body>
</html>
